name: GitHub-Action-Importer/GHAdemo2
on:
  push:
  workflow_dispatch:
concurrency:
  group: "${{ github.ref }}"
  cancel-in-progress: true
jobs:
  bash_execute:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
    - uses: actions/checkout@v4.1.0
      with:
        fetch-depth: 20
        lfs: true
    - run: mkdir myfolder
    - run: cp ./basic.sh myfolder/
    - run: cd myfolder
    - run: bash ./basic.sh
    - run: touch newfile
    - uses: actions/upload-artifact@v4.1.0
      if: success()
      with:
        name: "${{ github.job }}"
        retention-days: 30
        path: "./myfolder"
